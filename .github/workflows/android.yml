name: Android CI/CD - Build & Release APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [published]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  GRADLE_VERSION: '9.5.0'
  APP_NAME: 'PixaVault'
  APP_ID: 'com.pixavault.app'

jobs:
  build-debug-apk:
    name: 🏗️ Build Debug APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: ⬇️ Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v${{ env.GRADLE_VERSION }}/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          ls -lh gradle/wrapper/

      - name: 🔓 Make gradlew executable
        run: chmod +x ./gradlew

      - name: ✅ Verify Gradle
        run: ./gradlew --version

      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: 🔍 Verify APK
        run: |
          echo "=== APK Files ==="
          find app/build -name "*.apk" -type f 2>/dev/null
          ls -lh app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug folder"

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  create-release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-debug-apk
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    permissions:
      contents: write
    
    steps:
      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-debug-apk
          path: ./release

      - name: 🏷️ Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.apk
          name: ${{ env.APP_NAME }} v${{ github.ref_name }}
          body: |
            # 🎉 ${{ env.APP_NAME }} v${{ github.ref_name }}
            
            ## 📥 Download
            Install `app-debug.apk` on your Android device.
            
            ## ℹ️ Build Info
            - **App**: ${{ env.APP_NAME }}
            - **App ID**: ${{ env.APP_ID }}
            - **Version**: ${{ github.ref_name }}
            - **Commit**: `${{ github.sha }}`
            
            Built with ❤️ | GitHub Actions CI/CD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
