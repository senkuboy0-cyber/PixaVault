name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [created]

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        run: |
          gradle wrapper --gradle-version 8.2

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/debug/*.apk
          name: PixaVault v${{ github.ref_name }} (Debug APK)
          body: |
            🎉 **PixaVault Debug APK**
            
            Built from: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            
            📥 Download the APK and install on your Android device!
          prerelease: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Debug APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PixaVault-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create Release on Tag
        if: startsWith(github.ref, 'refs/tags/') && !github.event.release
        run: |
          curl -L \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"app/build/outputs/apk/debug/app-debug.apk" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ github.event.id }}/assets?name=app-debug.apk"

  build-release-apk:
    needs: build-debug-apk
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        run: |
          gradle wrapper --gradle-version 8.2

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

  notify:
    needs: build-debug-apk
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Success Notification
        run: |
          echo "🎉 PixaVault APK Build Complete!"
          echo "📦 Artifact: PixaVault-debug-apk"
          echo "🔗 Repository: ${{ github.repository }}"
