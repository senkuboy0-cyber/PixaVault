name: Android CI/CD - Build & Release APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '21'
  GRADLE_VERSION: '9.1.0'
  APP_NAME: 'PixaVault'
  APP_ID: 'com.pixavault.app'

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # JOB 1: Download Gradle Wrapper
  # ═══════════════════════════════════════════════════════════════════
  download-wrapper:
    name: 📦 Prepare Gradle Wrapper
    runs-on: ubuntu-latest
    outputs:
      wrapper_status: 'ready'
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⬇️ Download gradle-wrapper.jar
        run: |
          echo "📦 Downloading Gradle Wrapper..."
          mkdir -p gradle/wrapper
          
          # Download gradle-wrapper.jar
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v${{ env.GRADLE_VERSION }}/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          
          # Verify download
          if [ -s "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "✅ gradle-wrapper.jar downloaded successfully!"
            ls -lh gradle/wrapper/
            file gradle/wrapper/gradle-wrapper.jar
          else
            echo "❌ Download failed, trying alternative source..."
            
            # Try alternative source
            curl -sL "https://github.com/nicoulaj/gradle-wrapper-artifacts/raw/master/gradle-${{ env.GRADLE_VERSION }}/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
              
            if [ -s "gradle/wrapper/gradle-wrapper.jar" ]; then
              echo "✅ Downloaded from alternative source!"
            else
              echo "❌ All download attempts failed!"
              exit 1
            fi
          fi

      - name: 🔓 Make gradlew executable
        run: chmod +x ./gradlew

      - name: ✅ Verify Gradle Wrapper
        run: |
          ./gradlew --version

  # ═══════════════════════════════════════════════════════════════════
  # JOB 2: Build Debug APK
  # ═══════════════════════════════════════════════════════════════════
  build-debug-apk:
    name: 🏗️ Build Debug APK
    runs-on: ubuntu-latest
    needs: download-wrapper
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: ⬇️ Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v${{ env.GRADLE_VERSION }}/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: 🔓 Make gradlew executable
        run: chmod +x ./gradlew

      - name: ✅ Verify Gradle
        run: ./gradlew --version

      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 🔍 Verify APK
        run: |
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ APK Build Successful!"
            ls -lh app/build/outputs/apk/debug/app-debug.apk
          else
            echo "❌ APK Build Failed!"
            exit 1
          fi

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          compression-level: 9

  # ═══════════════════════════════════════════════════════════════════
  # JOB 3: Create GitHub Release (Tag Push)
  # ═══════════════════════════════════════════════════════════════════
  create-release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-debug-apk
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    permissions:
      contents: write
    
    steps:
      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-debug-apk
          path: ./release

      - name: 🏷️ Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.apk
          name: ${{ env.APP_NAME }} v${{ github.ref_name }}
          body: |
            # 🎉 ${{ env.APP_NAME }} v${{ github.ref_name }} Released!
            
            ## 📥 Download APK
            Install `app-debug.apk` on your Android device.
            
            ## ℹ️ Build Info
            - **App**: ${{ env.APP_NAME }}
            - **App ID**: ${{ env.APP_ID }}
            - **Version**: ${{ github.ref_name }}
            - **Commit**: `${{ github.sha }}`
            
            ---
            Built with ❤️ | GitHub Actions CI/CD
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
