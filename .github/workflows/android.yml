name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [published]

env:
  JAVA_VERSION: '21'
  GRADLE_VERSION: '9.1.0'

jobs:
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        run: |
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version=${{ env.GRADLE_VERSION }}
          fi

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=${{ env.GRADLE_VERSION }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Verify APK exists
        run: |
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ APK built successfully!"
            ls -lh app/build/outputs/apk/debug/app-debug.apk
          else
            echo "❌ APK not found!"
            exit 1
          fi

      - name: Upload Debug APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PixaVault-debug-apk-v${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  create-release:
    needs: build-debug-apk
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK from build job
        uses: actions/download-artifact@v4
        with:
          name: PixaVault-debug-apk-v${{ needs.build-debug-apk.outputs.run_number }}
          path: ./apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./apk/*.apk
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release-apk:
    needs: build-debug-apk
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=${{ env.GRADLE_VERSION }}

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
